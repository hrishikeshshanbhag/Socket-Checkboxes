<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1 million checkbox</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f3ee;
        --ink: #1d2328;
        --muted: #66717a;
        --panel: rgba(255, 255, 255, 0.82);
        --line: rgba(29, 35, 40, 0.12);
        --accent: #147f8f;
        --accent-strong: #0f6572;
        --check: #ffffff;
        --shadow: 0 22px 70px rgba(23, 41, 50, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 40px 18px;
        color: var(--ink);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background:
          radial-gradient(
            circle at top left,
            rgba(20, 127, 143, 0.18),
            transparent 34rem
          ),
          linear-gradient(135deg, #fbfaf7 0%, var(--bg) 52%, #e9f1ee 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(29, 35, 40, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(29, 35, 40, 0.045) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.7),
          transparent 78%
        );
      }

      #container {
        width: min(760px, 100%);
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(42px, 1fr));
        gap: 14px;
        padding: clamp(22px, 5vw, 42px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      #container::before {
        content: "1 Million Checkbox";
        grid-column: 1 / -1;
        margin-bottom: 2px;
        color: var(--ink);
        font-size: clamp(1.7rem, 5vw, 3.25rem);
        font-weight: 800;
        line-height: 0.95;
        letter-spacing: 0;
      }

      #container::after {
        content: "A small synchronized grid, freshly dressed.";
        grid-column: 1 / -1;
        order: -1;
        margin-bottom: -2px;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      input[type="checkbox"] {
        width: 42px;
        height: 42px;
        margin: 0;
        display: grid;
        place-content: center;
        appearance: none;
        border: 1px solid rgba(20, 127, 143, 0.38);
        border-radius: 8px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.96),
          rgba(241, 247, 246, 0.92)
        );
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.9),
          0 10px 24px rgba(23, 41, 50, 0.1);
        cursor: pointer;
        transition:
          transform 140ms ease,
          border-color 140ms ease,
          background 140ms ease,
          box-shadow 140ms ease;
      }

      input[type="checkbox"]::before {
        content: "";
        width: 14px;
        height: 22px;
        border: solid var(--check);
        border-width: 0 4px 4px 0;
        opacity: 0;
        transform: rotate(45deg) scale(0.68) translate(-2px, -3px);
        transition:
          opacity 120ms ease,
          transform 140ms ease;
      }

      input[type="checkbox"]:hover {
        transform: translateY(-2px);
        border-color: rgba(20, 127, 143, 0.72);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.95),
          0 16px 30px rgba(23, 41, 50, 0.16);
      }

      input[type="checkbox"]:checked {
        border-color: var(--accent-strong);
        background: linear-gradient(
          180deg,
          var(--accent),
          var(--accent-strong)
        );
      }

      input[type="checkbox"]:checked::before {
        opacity: 1;
        transform: rotate(45deg) scale(1) translate(-2px, -3px);
      }

      input[type="checkbox"]:focus-visible {
        outline: 3px solid rgba(20, 127, 143, 0.28);
        outline-offset: 3px;
      }

      @media (max-width: 520px) {
        body {
          padding: 22px 12px;
        }

        #container {
          grid-template-columns: repeat(auto-fit, minmax(34px, 1fr));
          gap: 10px;
          padding: 18px;
        }

        input[type="checkbox"] {
          width: 34px;
          height: 34px;
        }
      }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const container = document.getElementById("container");
      const socket = io();
      socket.on("server:checkbox:clicked", (data) => {
        const { index, checked } = data;
        const checkbox = document.getElementById(`checkbox-${index}`);
        if (checkbox) {
          checkbox.checked = checked;
        }
      });
      socket.on("server:checkbox:too-many-request", () => {
        alert("Too many request, try after 5 sec");
      });
      window.addEventListener("load", async () => {
        const response = await fetch("/checkboxes", { method: "GET" });
        const data = await response.json();
        if (data && data.checkboxes) {
          data.checkboxes.forEach((serverValue, index) => {
            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.setAttribute("id", `checkbox-${index}`);
            checkbox.checked = serverValue;
            checkbox.addEventListener("change", () => {
              socket.emit("client:checkbox:clicked", {
                index,
                checked: event.target.checked,
              });
            });
            container.appendChild(checkbox);
          });
        }
      });
    </script>
  </body>
</html>
